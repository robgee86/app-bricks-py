services:
  ei-obj-video-anomalies-det-runner:
    image: ${DOCKER_REGISTRY_BASE:-ghcr.io/arduino/}app-bricks/ei-qnn-models-runner:__BRICKS_RELEASE_VERSION__
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    devices:
      - /dev/dma_heap/system
      - /dev/dma_heap/qcom,system
      - /dev/fastrpc-cdsp        
    ports:
      - ${BIND_ADDRESS:-127.0.0.1}:1343:1337
    volumes:
      - "${CUSTOM_MODEL_PATH:-/home/arduino/.arduino-bricks}:${CUSTOM_MODEL_PATH:-/home/arduino/.arduino-bricks}"
    command: ["--model-file", "${EI_V_ANOMALY_DETECTION_MODEL:-/models/ootb/ei/concrete-crack-anomaly-detection.eim}", "--run-http-server", "1337", "--dont-print-predictions"]
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:1337/api/info || exit 1" ]
      interval: 2s
      timeout: 2s
      retries: 25
