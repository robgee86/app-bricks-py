id: arduino:local_llm
name: Local LLM
description: "Local LLM Brick enables seamless integration with locally hosted Large Language Models (LLMs) for advanced AI capabilities in your Arduino projects."
requires_container: true
requires_model: true
model: genie:qwen2.5-7b
variables:
  - name: LOCAL_LLM_API_KEY
    description: API Key for the local LLM service
    default_value: api_key
    secret: true