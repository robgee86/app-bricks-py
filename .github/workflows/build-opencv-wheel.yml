name: Build OpenCV Python wheel

on:
  push:
    tags:
      - 'opencv/*'

permissions:
  contents: write

jobs:
  build-wheels:
    runs-on: ubuntu-24.04-arm
    container:
      image: quay.io/pypa/manylinux_2_39_aarch64
      options: --user root
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable CRB and EPEL repositories
        run: |
          dnf install -y dnf-plugins-core
          dnf config-manager --set-enabled crb
          dnf install -y epel-release

      - name: Install build tools
        run: |
          dnf install -y gcc gcc-c++ make pkgconf-pkg-config ninja-build cmake git ca-certificates

      - name: Install GitHub CLI
        run: |
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf install -y gh

      - name: Set up Python
        run: |
          PYTHON_DIR=/opt/python/cp313-cp313
          echo "PATH=$PYTHON_DIR/bin:$PATH" >> "$GITHUB_ENV"

      - name: Install FFmpeg development libraries
        run: |
          dnf install -y ffmpeg-free-devel

      - name: Install Media I/O development libraries
        run: |
          dnf install -y libjpeg-turbo-devel libpng-devel libtiff-devel libwebp-devel libavif-devel openblas-devel lapack-devel

      - name: Install GStreamer development libraries
        run: |
          dnf install -y gstreamer1-devel gstreamer1-plugins-base-devel

      - name: Clone opencv-python repo
        run: |
          git clone --depth 1 https://github.com/opencv/opencv-python.git
          cd opencv-python
          git fetch --depth 1 origin 4ddfc013fd1f13d9b9e379dbebf2cdbeb052e7f8
          git checkout 4ddfc013fd1f13d9b9e379dbebf2cdbeb052e7f8
          git submodule update --init --recursive --depth 1

      - name: Build OpenCV Python wheel
        run: |
          cd opencv-python
          export OPENCV_VERSION=4.13.0
          export ENABLE_CONTRIB=0
          export ENABLE_HEADLESS=1
          export CMAKE_ARGS="-GNinja -DWITH_GSTREAMER=ON -DWITH_FFMPEG=ON -DWITH_CAROTENE=ON -DWITH_LAPACK=ON -DBUILD_opencv_python3=ON -DWITH_GTK=OFF -DWITH_QT=OFF -DWITH_CUDA=OFF -DBUILD_opencv_java=OFF -DWITH_VTK=OFF -DBUILD_opencv_dnn=OFF -DBUILD_opencv_dnn_modern=OFF"
          pip wheel . --verbose --no-deps

      - name: Repair wheel with auditwheel
        run: |
          cd opencv-python
          auditwheel repair opencv_python_headless*.whl --plat manylinux_2_39_aarch64 -w wheelhouse/

      - name: Print OpenCV build info
        run: |
          cd opencv-python
          python -m venv /tmp/opencv-test
          /tmp/opencv-test/bin/pip install wheelhouse/opencv_python_headless*.whl
          /tmp/opencv-test/bin/python -c "
          import cv2, os, importlib
          print('cv2 location:', cv2.__file__)
          print('cv2 dir:', [x for x in dir(cv2) if not x.startswith('_')])
          # Try loading the binary extension directly
          pkgdir = os.path.dirname(cv2.__file__)
          for f in sorted(os.listdir(pkgdir)):
              print(' ', f)
          try:
              from cv2 import cv2 as _cv2
              print('cv2.cv2 loaded')
          except ImportError as e:
              print('cv2.cv2 import failed:', e)
          print(cv2.getBuildInformation())
          "

      - name: Upload wheel files
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-wheels
          path: opencv-python/wheelhouse/*.whl

      - name: Determine version
        id: version
        run: |
          # Extract version from tag (opencv/4.13.0.92 -> 4.13.0.92)
          VERSION="${GITHUB_REF#refs/tags/opencv/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="opencv/$VERSION"
          REPO="${{ github.repository }}"

          # Delete release if it already exists
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists. Deleting..."
            gh release delete "$TAG" --repo "$REPO" --yes
          fi

          # Create release
          gh release create "$TAG" \
            opencv-python/wheelhouse/opencv_python_headless*.whl \
            --repo "$REPO" \
            --title "OpenCV Python headless $VERSION" \
            --notes "OpenCV Python headless wheel version $VERSION optimized for ARM64 architecture with GStreamer and FFmpeg support. Built on manylinux_2_39_aarch64."
