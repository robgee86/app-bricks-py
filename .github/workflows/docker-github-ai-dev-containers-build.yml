name: DEV - AI CONTAINERS build & publish

on:
  workflow_dispatch:
    inputs:
      skip_cache:
        description: 'Rebuild without cache'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  DEV_REGISTRY_PATH: ghcr.io/${{ github.repository_owner }}/
  GH_SOURCE_REPO: https://github.com/${{ github.repository_owner }}/app-bricks-py
  OPENCV_VERSION: 4.13.0

permissions:
  contents: write
  packages: write
  id-token: write

jobs:

  build-base:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dockerfile: ./containers/base/Dockerfile
            context: ./containers/base
            image: ghcr.io/${{ github.repository_owner }}/app-bricks/base
          - dockerfile: ./containers/aihub-models-runner/Dockerfile
            context: ./containers/aihub-models-runner
            image: ghcr.io/${{ github.repository_owner }}/app-bricks/aihub-models-runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Add support for more platforms with QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize branch name for cache tag
        id: sanitize
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          SAFE_BRANCH_NAME="${BRANCH_NAME//\//-}"
          echo "cache_tag=${SAFE_BRANCH_NAME}-buildcache" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=dev-next,enable=true
          images: ${{ matrix.image }}
          labels: |
            org.opencontainers.image.source=${{ env.GH_SOURCE_REPO}}
            org.opencontainers.image.url=${{ env.GH_SOURCE_REPO}}

      # Build and push Docker image with Buildx (don't push on PR)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: ${{ github.event.inputs.skip_cache != 'true' && format('type=registry,ref={0}:{1}', matrix.image, steps.sanitize.outputs.cache_tag) || '' }}
          cache-to: type=registry,ref=${{ matrix.image }}:${{ steps.sanitize.outputs.cache_tag }},mode=max
          provenance: false
          build-args: |
            REGISTRY=${{ env.DEV_REGISTRY_PATH }}
            OPENCV_REPO_OWNER=${{ github.repository_owner }}
            OPENCV_VERSION=${{ env.OPENCV_VERSION }}

  build:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./containers/ei-models-runner/Dockerfile
            context: ./containers/ei-models-runner
            image: ghcr.io/${{ github.repository_owner }}/app-bricks/ei-models-runner
          - dockerfile: ./containers/llamacpp-runner/Dockerfile
            context: ./containers/llamacpp-runner
            image: ghcr.io/${{ github.repository_owner }}/app-bricks/llamacpp-models-runner
          - dockerfile: ./containers/ollama-runner/Dockerfile
            context: ./containers/ollama-runner
            image: ghcr.io/${{ github.repository_owner }}/app-bricks/ollama-models-runner
          - dockerfile: ./containers/gesture-recognition/Dockerfile
            context: ./containers/gesture-recognition
            image: ghcr.io/${{ github.repository_owner }}/app-bricks/gesture-recognition

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Add support for more platforms with QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize branch name for cache tag
        id: sanitize
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          SAFE_BRANCH_NAME="${BRANCH_NAME//\//-}"
          echo "cache_tag=${SAFE_BRANCH_NAME}-buildcache" >> $GITHUB_OUTPUT

      - name: Build cache configuration
        id: cache
        run: |
          CACHE_TAG="${{ steps.sanitize.outputs.cache_tag }}"
          if [ "${{ github.event.inputs.skip_cache }}" != "true" ]; then
            echo "cache_from=type=registry,ref=${{ matrix.image }}:${CACHE_TAG}" >> $GITHUB_OUTPUT
          else
            echo "cache_from=" >> $GITHUB_OUTPUT
          fi
          echo "cache_to=type=registry,ref=${{ matrix.image }}:${CACHE_TAG},mode=max" >> $GITHUB_OUTPUT

      # Extract metadata from the GitHub context
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=dev-next,enable=true
          images: ${{ matrix.image }}
          labels: |
            org.opencontainers.image.source=${{ env.GH_SOURCE_REPO}}
            org.opencontainers.image.url=${{ env.GH_SOURCE_REPO}}

      # Build and push Docker image with Buildx (don't push on PR)
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          provenance: false
          build-args: |
            REGISTRY=${{ env.DEV_REGISTRY_PATH }}
            BASE_IMAGE_VERSION=dev-next
