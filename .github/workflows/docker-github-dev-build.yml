name: DEV - build & publish Arduino dev-next containers

on:
  workflow_dispatch:
    inputs:
      skip_cache:
        description: 'Rebuild without cache'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  DEV_REGISTRY_PATH: ghcr.io/${{ github.repository_owner }}/
  GH_SOURCE_REPO: https://github.com/${{ github.repository_owner }}/app-bricks-py

permissions:
  contents: write
  packages: write
  id-token: write

jobs:

  build-base:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./containers/python-base/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/app-bricks/python-base
            context: ./containers/python-base

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Add support for more platforms with QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize branch name for cache tag
        id: sanitize
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          SAFE_BRANCH_NAME="${BRANCH_NAME//\//-}"
          echo "cache_tag=${SAFE_BRANCH_NAME}-buildcache" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=dev-next,enable=true
          images: ${{ matrix.image }}
          labels: |
            org.opencontainers.image.source=${{ env.GH_SOURCE_REPO}}
            org.opencontainers.image.url=${{ env.GH_SOURCE_REPO}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: ${{ github.event.inputs.skip_cache != 'true' && format('type=registry,ref={0}:{1}', matrix.image, steps.sanitize.outputs.cache_tag) || '' }}
          cache-to: type=registry,ref=${{ matrix.image }}:${{ steps.sanitize.outputs.cache_tag }},mode=max
          provenance: false

  build:
    needs: build-base
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
      TASKFILE_PATH: "/home/runner/go/bin"
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: ./containers/python-apps-base/Dockerfile
            context: ./containers/python-apps-base
            image: ghcr.io/${{ github.repository_owner }}/app-bricks/python-apps-base
            build_python_package: true           

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        if: matrix.build_python_package
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install and build library
        if: matrix.build_python_package
        env:
          PUBLIC_IMAGE_REGISTRY_BASE: ${{ env.DEV_REGISTRY_PATH }}/
        run: |
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)
          pip install go-task-bin==${{ env.TASKFILE_VERSION }}
          task init:ci
          task build-dev
          cp ./dist/arduino*.whl ./containers/python-apps-base/

      # Add support for more platforms with QEMU
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize branch name for cache tag
        id: sanitize
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          SAFE_BRANCH_NAME="${BRANCH_NAME//\//-}"
          echo "cache_tag=${SAFE_BRANCH_NAME}-buildcache" >> $GITHUB_OUTPUT

      - name: Build cache configuration
        id: cache
        run: |
          CACHE_TAG="${{ steps.sanitize.outputs.cache_tag }}"
          if [ "${{ github.event.inputs.skip_cache }}" != "true" ]; then
            echo "cache_from=type=registry,ref=${{ matrix.image }}:${CACHE_TAG}" >> $GITHUB_OUTPUT
          else
            echo "cache_from=" >> $GITHUB_OUTPUT
          fi
          echo "cache_to=type=registry,ref=${{ matrix.image }}:${CACHE_TAG},mode=max" >> $GITHUB_OUTPUT

      # Extract metadata from the GitHub context
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=dev-next,enable=true
          images: ${{ matrix.image }}
          labels: |
            org.opencontainers.image.source=${{ env.GH_SOURCE_REPO}}
            org.opencontainers.image.url=${{ env.GH_SOURCE_REPO}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          provenance: false
          build-args: |
            REGISTRY=${{ env.DEV_REGISTRY_PATH }}
            BASE_IMAGE_VERSION=dev-next
