name: RELEASE - Build & Publish Release

run-name: "Release ${{ inputs.tag || github.ref_name }}"

on:
  push:
    tags:
      - 'release/*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. release/1.2.3)"
        type: string
        required: true

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_DESTINATION_ORG: ghcr.io/${{ github.repository_owner }}
  GH_DESTINATION_REPO: https://github.com/${{ github.repository }}

permissions:
  contents: write
  packages: write
  id-token: write
  actions: write

jobs:
  detect:
    runs-on: ubuntu-24.04-arm
    outputs:
      tag_ref: ${{ steps.detect.outputs.tag_ref }}
      version: ${{ steps.detect.outputs.version }}
      prerelease: ${{ steps.detect.outputs.prerelease }}
      base_containers: ${{ steps.detect.outputs.base_containers }}
      downstream_containers: ${{ steps.detect.outputs.downstream_containers }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect containers to release
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_REF="${{ inputs.tag }}"
          else
            TAG_REF="${GITHUB_REF_NAME}"
          fi

          VERSION="${TAG_REF#*/}"
          echo "tag_ref=$TAG_REF" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" =~ rc|alpha|beta ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

          ALL_KNOWN=()
          for CI_JSON in containers/*/ci.json; do
            CONTAINER=$(basename "$(dirname "$CI_JSON")")
            ALL_KNOWN+=("$CONTAINER")
          done

          DOWNSTREAM_IN_BUILD=()
          for CONTAINER in "${ALL_KNOWN[@]}"; do
            DS_LIST=$(jq -r '.downstream // [] | .[]' "containers/$CONTAINER/ci.json" 2>/dev/null)
            for DS in $DS_LIST; do
              if [[ " ${ALL_KNOWN[*]} " =~ " $DS " ]] && [[ ! " ${DOWNSTREAM_IN_BUILD[*]} " =~ " $DS " ]]; then
                DOWNSTREAM_IN_BUILD+=("$DS")
              fi
            done
          done

          BASE_CONTAINERS=()
          for CONTAINER in "${ALL_KNOWN[@]}"; do
            if [[ ! " ${DOWNSTREAM_IN_BUILD[*]} " =~ " $CONTAINER " ]]; then
              BASE_CONTAINERS+=("$CONTAINER")
            fi
          done

          echo "Base containers: ${BASE_CONTAINERS[*]}"
          echo "Downstream containers: ${DOWNSTREAM_IN_BUILD[*]}"

          echo "base_containers=$(printf '%s\n' "${BASE_CONTAINERS[@]}" | jq -R . | jq -sc .)" >> $GITHUB_OUTPUT
          if [[ ${#DOWNSTREAM_IN_BUILD[@]} -eq 0 ]]; then
            echo "downstream_containers=[]" >> $GITHUB_OUTPUT
          else
            echo "downstream_containers=$(printf '%s\n' "${DOWNSTREAM_IN_BUILD[@]}" | jq -R . | jq -sc .)" >> $GITHUB_OUTPUT
          fi

  upload-whl:
    runs-on: ubuntu-24.04-arm
    needs: [detect]
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject release version
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          sed -i "s|^version = \"0.0.0\"|version = \"${VERSION}\"|" pyproject.toml
          sed -i "s|__version__: str = \"0.0.0\"|__version__: str = \"${VERSION}\"|" src/arduino/_version.py

      - name: Build wheel in debian:trixie
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            -e PUBLIC_IMAGE_REGISTRY_BASE="${{ env.GHCR_DESTINATION_ORG }}/" \
            -e BRICKS_RELEASE_VERSION="${{ needs.detect.outputs.version }}" \
            debian:trixie bash -c "
              set -e
              apt-get update
              apt-get install -y --no-install-recommends --no-install-suggests sudo git ca-certificates python3-dev python3-pip build-essential pkg-config
              echo '[global]' > /etc/pip.conf
              echo 'break-system-packages = true' >> /etc/pip.conf
              git config --global --add safe.directory '*'
              pip install go-task-bin==${{ env.TASKFILE_VERSION }}
              pip install https://github.com/${{ github.repository }}/releases/download/opencv/4.13.0.92/opencv_python_headless-4.13.0.92-cp313-cp313-linux_aarch64.whl
              task init:ci
              task build
            "

      - name: Share wheel with downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: whl
          path: dist/arduino*.whl
          retention-days: 1

  build:
    runs-on: ubuntu-24.04-arm
    needs: [detect, upload-whl]
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.detect.outputs.base_containers) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read container config
        id: config
        run: |
          CI_JSON="containers/${{ matrix.container }}/ci.json"
          echo "tag_latest=$(jq -r '.tag_latest // false' "$CI_JSON")" >> $GITHUB_OUTPUT
          BUILD_ARGS=$(jq -r '.build_args // {} | to_entries | map("\(.key)=\(.value)") | join("\n")' "$CI_JSON")
          echo "build_args<<EOF" >> $GITHUB_OUTPUT
          echo "$BUILD_ARGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Log into registry ${{ env.GHCR_REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=${{ needs.detect.outputs.version }}
            type=raw,value=latest,enable=${{ steps.config.outputs.tag_latest == 'true' && needs.detect.outputs.prerelease == 'false' }}
          images: ${{ env.GHCR_DESTINATION_ORG }}/app-bricks/${{ matrix.container }}
          labels: |
            org.opencontainers.image.source=${{ env.GH_DESTINATION_REPO }}
            org.opencontainers.image.url=${{ env.GH_DESTINATION_REPO }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./containers/${{ matrix.container }}
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=registry,ref=${{ env.GHCR_DESTINATION_ORG }}/app-bricks/${{ matrix.container }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_DESTINATION_ORG }}/app-bricks/${{ matrix.container }}:buildcache,mode=max
          provenance: false
          build-args: ${{ steps.config.outputs.build_args }}

  build-downstream:
    runs-on: ubuntu-24.04-arm
    needs: [ detect, build ]
    if: needs.detect.outputs.downstream_containers != '[]'
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.detect.outputs.downstream_containers) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Read container config
        id: config
        run: |
          CI_JSON="containers/${{ matrix.container }}/ci.json"
          echo "build_whl=$(jq -r '.build_whl // false' "$CI_JSON")" >> $GITHUB_OUTPUT
          echo "tag_latest=$(jq -r '.tag_latest // false' "$CI_JSON")" >> $GITHUB_OUTPUT
          BUILD_ARGS=$(jq -r '.build_args // {} | to_entries | map("\(.key)=\(.value)") | join("\n")' "$CI_JSON")
          echo "build_args<<EOF" >> $GITHUB_OUTPUT
          echo "$BUILD_ARGS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download wheel artifact
        if: steps.config.outputs.build_whl == 'true'
        uses: actions/download-artifact@v4
        with:
          name: whl
          path: ./containers/${{ matrix.container }}/

      - name: Log into registry ${{ env.GHCR_REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          tags: |
            type=raw,value=${{ needs.detect.outputs.version }}
            type=raw,value=latest,enable=${{ steps.config.outputs.tag_latest == 'true' && needs.detect.outputs.prerelease == 'false' }}
          images: ${{ env.GHCR_DESTINATION_ORG }}/app-bricks/${{ matrix.container }}
          labels: |
            org.opencontainers.image.source=${{ env.GH_DESTINATION_REPO }}
            org.opencontainers.image.url=${{ env.GH_DESTINATION_REPO }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./containers/${{ matrix.container }}
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: type=registry,ref=${{ env.GHCR_DESTINATION_ORG }}/app-bricks/${{ matrix.container }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_DESTINATION_ORG }}/app-bricks/${{ matrix.container }}:buildcache,mode=max
          provenance: false
          build-args: |
            ${{ steps.config.outputs.build_args }}
            BASE_IMAGE_VERSION=${{ needs.detect.outputs.version }}
            REGISTRY=${{ env.GHCR_DESTINATION_ORG }}/

  upload-release:
    runs-on: ubuntu-24.04-arm
    needs: [detect, upload-whl, build, build-downstream]
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: whl
          path: dist/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/arduino*.whl
          tag_name: ${{ needs.detect.outputs.tag_ref }}
          name: Release ${{ needs.detect.outputs.version }}
          prerelease: ${{ needs.detect.outputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
