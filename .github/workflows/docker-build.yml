name: DEV - Build & Publish Branch Containers

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:
    inputs:
      containers:
        description: "Comma-separated container names to build, or 'all' for all containers"
        type: string
        default: "all"
      tag:
        description: "Custom image tag (optional, defaults to sanitized branch name)"
        type: string
        default: ""
      skip_cache:
        description: 'Rebuild without cache'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  DEV_REGISTRY_PATH: ghcr.io/${{ github.repository_owner }}/

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  detect-changes:
    runs-on: ubuntu-24.04-arm
    outputs:
      containers: ${{ steps.detect.outputs.containers }}
      downstream_containers: ${{ steps.detect.outputs.downstream_containers }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect containers to build
        id: detect
        run: |
          set -ex

          CHANGED=()

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT="${{ inputs.containers }}"
            if [[ "$INPUT" == "all" ]]; then
              while IFS= read -r CONTAINER; do
                CHANGED+=("$CONTAINER")
              done < <(ls -d containers/*/ | xargs -I{} basename {})
            else
              while IFS= read -r CONTAINER; do
                CHANGED+=("$CONTAINER")
              done < <(echo "$INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//')
            fi
          else
            BEFORE="${{ github.event.before }}"
            ZERO_SHA="0000000000000000000000000000000000000000"

            # Fall back to origin/main if BEFORE is the zero SHA (new branch)
            # or if the commit no longer exists (e.g. after a force-push/amend)
            if [[ "$BEFORE" == "$ZERO_SHA" ]] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
              echo "Before SHA not available, falling back to origin/main"
              BEFORE=$(git rev-parse origin/main 2>/dev/null || echo "")
              if [[ -z "$BEFORE" ]]; then
                echo "No base commit found, skipping builds"
                echo "containers=[]" >> $GITHUB_OUTPUT
                echo "downstream_containers=[]" >> $GITHUB_OUTPUT
                exit 0
              fi
            fi

            for CI_JSON in containers/*/ci.json; do
              CONTAINER=$(basename "$(dirname "$CI_JSON")")
              WATCH_PATHS=$(jq -r '.watch_paths | join(" ")' "$CI_JSON")
              if git diff --name-only "$BEFORE" HEAD -- $WATCH_PATHS | grep -q .; then
                CHANGED+=("$CONTAINER")
              fi
            done

            # Cascade: add downstream containers for each changed container
            for CONTAINER in "${CHANGED[@]}"; do
              DOWNSTREAM=$(jq -r '.downstream // [] | .[]' "containers/$CONTAINER/ci.json")
              for DS in $DOWNSTREAM; do
                if [[ ! " ${CHANGED[*]} " =~ " $DS " ]]; then
                  echo "Cascading: $DS depends on $CONTAINER"
                  CHANGED+=("$DS")
                fi
              done
            done
          fi

          if [[ ${#CHANGED[@]} -eq 0 ]]; then
            echo "No container sources changed"
            echo "containers=[]" >> $GITHUB_OUTPUT
            echo "downstream_containers=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Split CHANGED into base containers and downstream containers.
          # A container is downstream if it appears in the downstream list of another container being built.
          DOWNSTREAM_IN_BUILD=()
          for CONTAINER in "${CHANGED[@]}"; do
            DS_LIST=$(jq -r '.downstream // [] | .[]' "containers/$CONTAINER/ci.json" 2>/dev/null)
            for DS in $DS_LIST; do
              if [[ " ${CHANGED[*]} " =~ " $DS " ]] && [[ ! " ${DOWNSTREAM_IN_BUILD[*]} " =~ " $DS " ]]; then
                DOWNSTREAM_IN_BUILD+=("$DS")
              fi
            done
          done

          BASE_CONTAINERS=()
          for CONTAINER in "${CHANGED[@]}"; do
            if [[ ! " ${DOWNSTREAM_IN_BUILD[*]} " =~ " $CONTAINER " ]]; then
              BASE_CONTAINERS+=("$CONTAINER")
            fi
          done

          echo "Base containers: ${BASE_CONTAINERS[*]}"
          echo "Downstream containers: ${DOWNSTREAM_IN_BUILD[*]}"

          if [[ ${#BASE_CONTAINERS[@]} -eq 0 ]]; then
            echo "containers=[]" >> $GITHUB_OUTPUT
          else
            echo "containers=$(printf '%s\n' "${BASE_CONTAINERS[@]}" | jq -R . | jq -sc .)" >> $GITHUB_OUTPUT
          fi

          if [[ ${#DOWNSTREAM_IN_BUILD[@]} -eq 0 ]]; then
            echo "downstream_containers=[]" >> $GITHUB_OUTPUT
          else
            echo "downstream_containers=$(printf '%s\n' "${DOWNSTREAM_IN_BUILD[@]}" | jq -R . | jq -sc .)" >> $GITHUB_OUTPUT
          fi

  build:
    needs: [detect-changes]
    if: needs.detect-changes.outputs.containers != '[]'
    runs-on: ubuntu-24.04-arm
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.detect-changes.outputs.containers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build wheel in debian:trixie
        if: matrix.container == 'python-apps-base'
        run: |
          # Remove tags that setuptools_scm can't parse (only ai/* and release/* are valid)
          git tag -l | grep -v -E '^(ai|release)/' | xargs -r git tag -d

          docker run --rm \
            -v "${{ github.workspace }}:/${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            -e PUBLIC_IMAGE_REGISTRY_BASE="${{ env.DEV_REGISTRY_PATH }}/" \
            debian:trixie bash -c "
              set -e
              apt-get update
              apt-get install -y --no-install-recommends --no-install-suggests sudo git ca-certificates python3-dev python3-pip build-essential pkg-config
              echo '[global]' > /etc/pip.conf
              echo 'break-system-packages = true' >> /etc/pip.conf
              git config --global --add safe.directory '*'
              pip install go-task-bin==${{ env.TASKFILE_VERSION }}
              pip install https://github.com/${{ github.repository }}/releases/download/opencv/4.13.0.92/opencv_python_headless-4.13.0.92-cp313-cp313-linux_aarch64.whl
              task init:ci
              task build-dev
              cp ./dist/arduino*.whl ./containers/python-apps-base/
            "

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute upstream image tag
        id: upstream_tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            TAG=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/^-//;s/-$//')
            echo "value=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Build cache configuration
        id: cache
        run: |
          CACHE_TAG="${{ steps.upstream_tag.outputs.value }}-buildcache"
          if [ "${{ github.event.inputs.skip_cache }}" != "true" ]; then
            echo "cache_from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}:${CACHE_TAG}" >> $GITHUB_OUTPUT
          else
            echo "cache_from=" >> $GITHUB_OUTPUT
          fi
          echo "cache_to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}:${CACHE_TAG},mode=max" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=${{ steps.upstream_tag.outputs.value }}
            type=raw,value=${{ steps.upstream_tag.outputs.value }}-${{ github.run_number }}
          images: ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./containers/${{ matrix.container }}
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          provenance: false
          build-args: |
            REGISTRY=${{ env.DEV_REGISTRY_PATH }}
          # BASE_IMAGE_VERSION=latest # currently not used, defaults to value used in Dockerfile

  build-downstream:
    needs: [detect-changes, build]
    if: needs.detect-changes.outputs.downstream_containers != '[]'
    runs-on: ubuntu-24.04-arm
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.detect-changes.outputs.downstream_containers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build wheel in debian:trixie
        if: matrix.container == 'python-apps-base'
        run: |
          # Remove tags that setuptools_scm can't parse (only ai/* and release/* are valid)
          git tag -l | grep -v -E '^(ai|release)/' | xargs -r git tag -d

          docker run --rm \
            -v "${{ github.workspace }}:/${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            -e PUBLIC_IMAGE_REGISTRY_BASE="${{ env.DEV_REGISTRY_PATH }}/" \
            debian:trixie bash -c "
              set -e
              apt-get update
              apt-get install -y --no-install-recommends --no-install-suggests sudo git ca-certificates python3-dev python3-pip build-essential pkg-config
              echo '[global]' > /etc/pip.conf
              echo 'break-system-packages = true' >> /etc/pip.conf
              git config --global --add safe.directory '*'
              pip install go-task-bin==${{ env.TASKFILE_VERSION }}
              pip install https://github.com/${{ github.repository }}/releases/download/opencv/4.13.0.92/opencv_python_headless-4.13.0.92-cp313-cp313-linux_aarch64.whl
              task init:ci
              task build-dev
              cp ./dist/arduino*.whl ./containers/python-apps-base/
            "

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute upstream image tag
        id: upstream_tag
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            TAG=$(echo "${{ github.ref_name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/^-//;s/-$//')
            echo "value=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Build cache configuration
        id: cache
        run: |
          CACHE_TAG="${{ steps.upstream_tag.outputs.value }}-buildcache"
          if [ "${{ github.event.inputs.skip_cache }}" != "true" ]; then
            echo "cache_from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}:${CACHE_TAG}" >> $GITHUB_OUTPUT
          else
            echo "cache_from=" >> $GITHUB_OUTPUT
          fi
          echo "cache_to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}:${CACHE_TAG},mode=max" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=${{ steps.upstream_tag.outputs.value }}
            type=raw,value=${{ steps.upstream_tag.outputs.value }}-${{ github.run_number }}
          images: ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./containers/${{ matrix.container }}
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          provenance: false
          build-args: |
            REGISTRY=${{ env.DEV_REGISTRY_PATH }}
            BASE_IMAGE_VERSION=${{ steps.upstream_tag.outputs.value }}
