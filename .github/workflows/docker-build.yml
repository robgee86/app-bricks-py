name: DEV - Build & Publish Branch Containers

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build (defaults to selected branch)"
        type: string
        required: false
        default: ""
      containers:
        description: "Comma-separated container names to build, or 'all' for all containers"
        type: string
        default: "all"
      tag:
        description: "Custom image tag (optional, defaults to sanitized branch name)"
        type: string
        default: ""
      skip_cache:
        description: "Rebuild without cache"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  DEV_REGISTRY_PATH: ghcr.io/${{ github.repository_owner }}/

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  setup:
    runs-on: ubuntu-24.04-arm
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
      containers: ${{ steps.detect.outputs.containers }}
      downstream_containers: ${{ steps.detect.outputs.downstream_containers }}
      image_tag: ${{ steps.detect.outputs.image_tag }}
    steps:
      - name: Resolve branch
        id: resolve
        run: |
          BRANCH="${{ inputs.branch || github.ref_name }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.branch }}
          fetch-depth: 0

      - name: Resolve containers to build
        id: detect
        run: |
          # Compute image tag from branch name unless an explicit tag was provided
          if [[ -n "${{ inputs.tag }}" ]]; then
            IMAGE_TAG="${{ inputs.tag }}"
          else
            IMAGE_TAG="dev-$(echo "${{ steps.resolve.outputs.branch }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g')"
          fi
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

          INPUT="${{ inputs.containers }}"
          CHANGED=()
          if [[ "$INPUT" == "all" ]]; then
            for CI_JSON in containers/*/ci.json; do
              CHANGED+=("$(basename "$(dirname "$CI_JSON")")")
            done
          else
            while IFS= read -r CONTAINER; do
              CHANGED+=("$CONTAINER")
            done < <(echo "$INPUT" | tr ',' '\n' | sed 's/^ *//;s/ *$//')
          fi

          # Forward cascade: if a base container is selected, add its downstream containers
          for CONTAINER in "${CHANGED[@]}"; do
            DOWNSTREAM=$(jq -r '.downstream // [] | .[]' "containers/$CONTAINER/ci.json")
            for DS in $DOWNSTREAM; do
              if [[ ! " ${CHANGED[*]} " =~ " $DS " ]]; then
                echo "Cascading downstream: $DS depends on $CONTAINER"
                CHANGED+=("$DS")
              fi
            done
          done

          # Reverse cascade: if a downstream container is selected, add its parent so the
          # base image is always built fresh before the downstream container
          for CONTAINER in "${CHANGED[@]}"; do
            for CI_JSON in containers/*/ci.json; do
              PARENT=$(basename "$(dirname "$CI_JSON")")
              DS_LIST=$(jq -r '.downstream // [] | .[]' "$CI_JSON" 2>/dev/null)
              for DS in $DS_LIST; do
                if [[ "$DS" == "$CONTAINER" ]] && [[ ! " ${CHANGED[*]} " =~ " $PARENT " ]]; then
                  echo "Cascading upstream: $PARENT required by $CONTAINER"
                  CHANGED+=("$PARENT")
                fi
              done
            done
          done

          if [[ ${#CHANGED[@]} -eq 0 ]]; then
            echo "No containers to build"
            echo "containers=[]" >> $GITHUB_OUTPUT
            echo "downstream_containers=[]" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Split into base and downstream containers.
          # A container is downstream if it appears in another container's downstream list.
          DOWNSTREAM_IN_BUILD=()
          for CONTAINER in "${CHANGED[@]}"; do
            DS_LIST=$(jq -r '.downstream // [] | .[]' "containers/$CONTAINER/ci.json" 2>/dev/null || true)
            for DS in $DS_LIST; do
              if [[ " ${CHANGED[*]} " =~ " $DS " ]] && [[ ! " ${DOWNSTREAM_IN_BUILD[*]} " =~ " $DS " ]]; then
                DOWNSTREAM_IN_BUILD+=("$DS")
              fi
            done
          done

          BASE_CONTAINERS=()
          for CONTAINER in "${CHANGED[@]}"; do
            if [[ ! " ${DOWNSTREAM_IN_BUILD[*]} " =~ " $CONTAINER " ]]; then
              BASE_CONTAINERS+=("$CONTAINER")
            fi
          done

          echo "Base containers: ${BASE_CONTAINERS[*]}"
          echo "Downstream containers: ${DOWNSTREAM_IN_BUILD[*]}"

          if [[ ${#BASE_CONTAINERS[@]} -eq 0 ]]; then
            echo "containers=[]" >> $GITHUB_OUTPUT
          else
            echo "containers=$(printf '%s\n' "${BASE_CONTAINERS[@]}" | jq -R . | jq -sc .)" >> $GITHUB_OUTPUT
          fi

          if [[ ${#DOWNSTREAM_IN_BUILD[@]} -eq 0 ]]; then
            echo "downstream_containers=[]" >> $GITHUB_OUTPUT
          else
            echo "downstream_containers=$(printf '%s\n' "${DOWNSTREAM_IN_BUILD[@]}" | jq -R . | jq -sc .)" >> $GITHUB_OUTPUT
          fi

  build:
    needs: [ setup ]
    if: needs.setup.outputs.containers != '[]'
    runs-on: ubuntu-24.04-arm
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.setup.outputs.containers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.branch }}
          fetch-depth: 0

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build cache configuration
        id: cache
        run: |
          CACHE_TAG="${{ needs.setup.outputs.image_tag }}-buildcache"
          if [ "${{ github.event.inputs.skip_cache }}" != "true" ]; then
            echo "cache_from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}:${CACHE_TAG}" >> $GITHUB_OUTPUT
          else
            echo "cache_from=" >> $GITHUB_OUTPUT
          fi
          echo "cache_to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}:${CACHE_TAG},mode=max" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=${{ needs.setup.outputs.image_tag }}
            type=raw,value=${{ needs.setup.outputs.image_tag }}-${{ github.run_number }}
          images: ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./containers/${{ matrix.container }}
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          provenance: false
          build-args: |
            REGISTRY=${{ env.DEV_REGISTRY_PATH }}
            BASE_IMAGE_VERSION=${{ needs.setup.outputs.image_tag }}

  build-downstream:
    needs: [ setup, build ]
    if: needs.setup.outputs.downstream_containers != '[]'
    runs-on: ubuntu-24.04-arm
    env:
      PYTHON_VERSION: "3.13"
      TASKFILE_VERSION: "3.45.4"
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.setup.outputs.downstream_containers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.setup.outputs.branch }}
          fetch-depth: 0

      - name: Build wheel in debian:trixie
        if: matrix.container == 'python-apps-base'
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" \
            -e PUBLIC_IMAGE_REGISTRY_BASE="${{ env.DEV_REGISTRY_PATH }}/" \
            -e BRICKS_RELEASE_VERSION="${{ needs.setup.outputs.image_tag }}" \
            debian:trixie bash -c "
              set -e
              apt-get update
              apt-get install -y --no-install-recommends --no-install-suggests sudo git ca-certificates python3-dev python3-pip build-essential pkg-config
              echo '[global]' > /etc/pip.conf
              echo 'break-system-packages = true' >> /etc/pip.conf
              git config --global --add safe.directory '*'
              pip install go-task-bin==${{ env.TASKFILE_VERSION }}
              task init:ci
              task build
              cp ./dist/arduino*.whl ./containers/python-apps-base/
            "

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build cache configuration
        id: cache
        run: |
          CACHE_TAG="${{ needs.setup.outputs.image_tag }}-buildcache"
          if [ "${{ github.event.inputs.skip_cache }}" != "true" ]; then
            echo "cache_from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}:${CACHE_TAG}" >> $GITHUB_OUTPUT
          else
            echo "cache_from=" >> $GITHUB_OUTPUT
          fi
          echo "cache_to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}:${CACHE_TAG},mode=max" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: |
            type=raw,value=${{ needs.setup.outputs.image_tag }}
            type=raw,value=${{ needs.setup.outputs.image_tag }}-${{ github.run_number }}
          images: ghcr.io/${{ github.repository_owner }}/app-bricks/${{ matrix.container }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./containers/${{ matrix.container }}
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/arm64
          cache-from: ${{ steps.cache.outputs.cache_from }}
          cache-to: ${{ steps.cache.outputs.cache_to }}
          provenance: false
          build-args: |
            REGISTRY=${{ env.DEV_REGISTRY_PATH }}
            BASE_IMAGE_VERSION=${{ needs.setup.outputs.image_tag }}
